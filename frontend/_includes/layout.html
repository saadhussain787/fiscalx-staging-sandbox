<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiscalX Professional Corporation</title>
    
    <!-- Production tailwind styles will compile here in Phase 2 -->
    <link rel="stylesheet" href="/style.css" />

    <!-- Custom Marquee Styling -->
    <style>
      @keyframes marquee {
        0% { transform: translateX(0%); }
        100% { transform: translateX(-50%); }
      }
      .animate-marquee {
        display: flex;
        width: max-content;
        animation: marquee 30s linear infinite;
      }
      .animate-marquee:hover {
        animation-play-state: paused;
      }
    </style>
</head>
<body class="min-h-screen flex flex-col bg-slate-50 text-slate-800 antialiased font-sans">

  <!-- Sticky High-Fidelity Header/Navigation -->
  <header class="sticky top-0 w-full bg-white/95 backdrop-blur-md z-50 border-b border-slate-100 transition-all duration-300">
    <div class="container mx-auto px-4 md:px-8 lg:px-16">
      <nav class="flex justify-between items-center py-4">
        <!-- Logo -->
        <div class="flex items-center gap-3">
          <a href="/" class="flex items-center gap-2 focus:outline-none focus:ring-2 focus:ring-brand-500 rounded" aria-label="FiscalX Home">
            <img src="/logo.svg" alt="FiscalX Logo" class="h-12 w-auto object-contain max-h-14" />
          </a>
        </div>

        <!-- Desktop Navigation (Hidden on Mobile) -->
        <ul class="hidden md:flex items-center gap-8 text-sm lg:text-base font-semibold text-slate-600">
          <li><a href="/#services" class="hover:text-brand-600 transition-colors duration-200">Services</a></li>
          <li><a href="/about" class="hover:text-brand-600 transition-colors duration-200">About</a></li>
          <li><a href="/#dates" class="hover:text-brand-600 transition-colors duration-200">Important Dates</a></li>
          <li><a href="/contact-us" class="hover:text-brand-600 transition-colors duration-200">Contact Us</a></li>
          
          <!-- Sleek Minimalist TikTok Icon Link -->
          <li class="flex items-center border-l border-slate-200 pl-4 h-5">
            <a href="https://www.tiktok.com/@wasim.kadri.cpa" target="_blank" rel="noopener noreferrer" class="text-slate-400 hover:text-brand-600 transition-colors duration-200" aria-label="Follow us on TikTok">
              <svg class="h-5 w-5 fill-current" viewBox="0 0 24 24">
                <path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.17-2.81-.74-3.94-1.69-.15-.12-.29-.26-.43-.4v5.33c-.02 2.15-.83 4.25-2.4 5.67-1.74 1.56-4.23 2.16-6.54 1.59-2.31-.57-4.19-2.43-4.78-4.72-.75-2.91.49-6.19 3.03-7.51 1.34-.69 2.92-.85 4.36-.45V12.1c-1.42-.45-3.08-.16-4.23.82-1.28 1.09-1.77 2.98-1.15 4.54.58 1.45 2.13 2.45 3.68 2.33 1.56-.12 2.89-1.24 3.19-2.77.13-.67.09-1.37.1-2.06V0h2.4zm0 0" />
              </svg>
            </a>
          </li>

          <li>
            <a href="/dashboard/" class="ml-2 inline-flex items-center justify-center px-5 py-2.5 rounded-lg border border-brand-200 text-brand-700 bg-brand-50 hover:bg-brand-100 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-brand-500">
              Dashboard
            </a>
          </li>
        </ul>

        <!-- Mobile Menu Hamburger Button (Visible only on Mobile) -->
        <div class="flex items-center md:hidden">
          <button id="global-mobile-menu-btn" type="button" class="text-slate-600 hover:text-brand-600 focus:outline-none focus:ring-2 focus:ring-brand-500 rounded p-1" aria-expanded="false" aria-label="Toggle Menu">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
        </div>
      </nav>

      <!-- Mobile Dropdown Drawer Menu (Hidden by default, visible only on Mobile) -->
      <div id="global-mobile-menu" class="hidden md:hidden border-t border-slate-100 py-4 space-y-3">
        <a href="/#services" class="block text-sm font-semibold text-slate-600 hover:text-brand-600 transition px-2 py-1">Services</a>
        <a href="/about" class="block text-sm font-semibold text-slate-600 hover:text-brand-600 transition px-2 py-1">About</a>
        <a href="/#dates" class="block text-sm font-semibold text-slate-600 hover:text-brand-600 transition px-2 py-1">Important Dates</a>
        <a href="/contact-us" class="block text-sm font-semibold text-slate-600 hover:text-brand-600 transition px-2 py-1 font-medium">Contact Us</a>
        
        <!-- Mobile Drawer TikTok Link -->
        <a href="https://www.tiktok.com/@wasim.kadri.cpa" target="_blank" rel="noopener noreferrer" class="flex items-center gap-2 text-sm font-semibold text-slate-600 hover:text-brand-600 transition px-2 py-1">
          <svg class="h-5 w-5 fill-current text-slate-500" viewBox="0 0 24 24">
            <path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.17-2.81-.74-3.94-1.69-.15-.12-.29-.26-.43-.4v5.33c-.02 2.15-.83 4.25-2.4 5.67-1.74 1.56-4.23 2.16-6.54 1.59-2.31-.57-4.19-2.43-4.78-4.72-.75-2.91.49-6.19 3.03-7.51 1.34-.69 2.92-.85 4.36-.45V12.1c-1.42-.45-3.08-.16-4.23.82-1.28 1.09-1.77 2.98-1.15 4.54.58 1.45 2.13 2.45 3.68 2.33 1.56-.12 2.89-1.24 3.19-2.77.13-.67.09-1.37.1-2.06V0h2.4zm0 0" />
          </svg>
          Follow on TikTok
        </a>

        <a href="/dashboard/" class="block text-center text-sm font-semibold text-brand-700 bg-brand-50 hover:bg-brand-100 border border-brand-200 rounded-lg px-4 py-2.5 transition">
          Dashboard
        </a>
      </div>
    </div>
  </header>

  <!-- Page Specific Content Injected Here -->
  <main class="flex-grow">
      {{ content }}
  </main>

  <!-- Global Footer -->
  <footer class="bg-white border-t border-slate-200 py-6 mt-auto">
      <div class="max-w-7xl mx-auto px-4 text-center text-sm text-slate-500">
          &copy; 2026 FiscalX. All rights reserved.
      </div>
  </footer>

  <!-- Global Mobile Navigation Toggle Script -->
  <script>
    const globalMenuBtn = document.getElementById('global-mobile-menu-btn');
    const globalMobileMenu = document.getElementById('global-mobile-menu');

    if (globalMenuBtn && globalMobileMenu) {
      globalMenuBtn.addEventListener('click', () => {
        const expanded = globalMenuBtn.getAttribute('aria-expanded') === 'true';
        globalMenuBtn.setAttribute('aria-expanded', !expanded);
        globalMobileMenu.classList.toggle('hidden');
      });
    }
  </script>

</body>
</html>
